name: Demo

# Builds the example as a static web app and publishes it to GitHub Pages so the
# docs can embed a live, interactive demo. Requires Pages to be enabled for the
# repo with "GitHub Actions" as the source (Settings → Pages).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm build # the example resolves the library via a link: dependency
      - run: pnpm --dir example install --frozen-lockfile
      - run: pnpm --dir example exec expo export --platform web
        env:
          # Served from https://<user>.github.io/react-native-bigger-calendar/
          EXPO_BASE_URL: /react-native-bigger-calendar
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: example/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
