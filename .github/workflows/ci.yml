name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir example install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format
      - run: pnpm typecheck
      - run: pnpm --dir example typecheck
      - run: pnpm test
      - run: pnpm build

  docs-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      # Run via npx, not `pnpm dlx`: the mint CLI's bundled scraper has an
      # undeclared `openapi-types` dependency that pnpm's strict store can't
      # resolve, but npm's hoisted layout does.
      - name: Check docs for broken links
        run: npx --yes mint broken-links
        working-directory: docs
